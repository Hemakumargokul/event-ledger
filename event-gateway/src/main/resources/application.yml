spring:
  application:
    name: event-gateway
  jpa:
    open-in-view: false

server:
  port: 8080

account-service:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
  # SPEC §8.2: per-attempt bounds; the retry policy sits above these
  connect-timeout: 1s
  read-timeout: 2s

# SPEC §8.2. Both policies react only to AccountServiceUnavailableException
# (connection failure / timeout / downstream 5xx); 4xx is neither retried nor
# recorded. Aspect order is fixed: Retry outside CircuitBreaker, so every
# attempt counts toward the CB window.
resilience4j:
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - com.eventledger.gateway.client.AccountServiceUnavailableException
  # Semaphore bulkhead (innermost decorator): caps servlet threads a hung
  # downstream can pin to 10 x read-timeout. When full it sheds immediately
  # (503 "overloaded"); BulkheadFullException is local back-pressure, so it is
  # neither retried nor recorded by the circuit breaker.
  bulkhead:
    instances:
      accountService:
        max-concurrent-calls: 10
        max-wait-duration: 0
  # Inbound API rate limit (bonus): one global fixed window shared by all
  # clients, fail-fast (no queueing). Excess requests get 429 before any
  # duplicate check or downstream call. /health and /actuator stay unlimited.
  ratelimiter:
    instances:
      gatewayApi:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.eventledger.gateway.client.AccountServiceUnavailableException

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: event-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  tracing:
    sampling:
      # Default 0.1 would hide trace IDs from 90% of requests
      probability: 1.0
